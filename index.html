<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JarryLabs - AI Powered Video Downloader</title>
    <meta name="description" content="Download high-quality videos with AI-generated summaries using JarryLabs.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader-dots div { animation-timing-function: cubic-bezier(0, 1, 1, 0); }
        @keyframes loader-dots1 { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-2 italic">Jarry<span class="text-green-500">Labs</span></h1>
        <p class="text-gray-500 mb-8 font-medium uppercase tracking-widest text-xs">AI Video Downloader Engine</p>

        <div class="flex gap-2 bg-gray-50 p-2 rounded-2xl border-2 border-gray-100">
            <input type="text" id="videoUrl" placeholder="Paste YouTube/TikTok link here..." class="w-full bg-transparent p-4 outline-none font-medium">
            <button onclick="fetchVideo()" class="bg-black text-white px-8 rounded-xl font-bold hover:bg-gray-800 transition-all uppercase text-sm tracking-tighter">Fetch</button>
        </div>

        <div id="loading" class="hidden mt-8">
            <div class="flex justify-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-bounce"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full animate-bounce delay-100"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full animate-bounce delay-200"></div>
            </div>
            <p class="text-xs font-bold mt-4 text-gray-400 italic">AI IS ANALYZING THE VIDEO...</p>
        </div>

        <div id="result" class="hidden mt-10 border-t pt-10 text-left">
            <img id="thumb" src="" class="w-full rounded-2xl shadow-lg mb-6">
            <h3 id="title" class="text-xl font-black mb-2 leading-tight"></h3>
            <div class="bg-green-50 border-l-4 border-green-500 p-4 mb-6">
                <p class="text-xs font-bold text-green-700 uppercase mb-1">AI Summary</p>
                <p id="aiSummary" class="text-gray-700 font-medium italic"></p>
            </div>
            <a id="dlBtn" href="#" target="_blank" class="block w-full bg-green-500 text-white text-center py-4 rounded-xl font-black uppercase tracking-widest hover:bg-green-600 transition-all">Download Video</a>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            if(!url) return alert("Please paste a URL");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                const res = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if(data.status === 'success') {
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('aiSummary').innerText = data.summary;
                    document.getElementById('dlBtn').href = data.download_link;
                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Server Error. Please check your Vercel Logs.");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
