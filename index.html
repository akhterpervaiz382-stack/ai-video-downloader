<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JarryLabs | AI Video Downloader</title>
    <meta name="description" content="Free AI-powered video downloader for YouTube and TikTok with smart summaries.">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center py-12 px-4">
    <div class="max-w-xl w-full bg-white rounded-[2rem] shadow-xl p-8 text-center border border-slate-100">
        <h1 class="text-4xl font-black italic tracking-tighter mb-1">Jarry<span class="text-green-500">Labs</span></h1>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-8">AI Intelligence Inside</p>

        <div class="relative group">
            <input type="text" id="videoUrl" placeholder="Paste link here..." 
                class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 px-6 outline-none focus:border-green-500 transition-all font-medium">
            <button onclick="processVideo()" class="mt-4 w-full bg-black text-white py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-slate-800 transition-all shadow-lg active:scale-95">Fetch Video</button>
        </div>

        <div id="loader" class="hidden mt-10">
            <div class="flex justify-center space-x-2 animate-pulse">
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            </div>
            <p class="text-[10px] font-black text-slate-400 mt-4 uppercase italic">AI is scanning content...</p>
        </div>

        <div id="resultCard" class="hidden mt-10 text-left border-t pt-8">
            <img id="vThumb" src="" class="w-full rounded-2xl mb-4 shadow-md">
            <h2 id="vTitle" class="text-lg font-bold leading-tight mb-4"></h2>
            <div class="bg-green-50 p-4 rounded-xl border-l-4 border-green-500 mb-6">
                <span class="text-[10px] font-black text-green-600 uppercase">AI Summary</span>
                <p id="vSummary" class="text-sm text-slate-700 italic mt-1 font-medium"></p>
            </div>
            <a id="vDownload" href="#" target="_blank" class="block w-full bg-green-500 text-white text-center py-4 rounded-xl font-black uppercase tracking-widest hover:bg-green-600 transition-all">Download Now</a>
        </div>
    </div>

    <script>
        async function processVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            if (!urlInput) return alert("Please paste a link first!");

            const loader = document.getElementById('loader');
            const result = document.getElementById('resultCard');

            loader.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const response = await fetch(`/api/download?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('vTitle').innerText = data.title;
                    document.getElementById('vThumb').src = data.thumbnail;
                    document.getElementById('vSummary').innerText = data.summary;
                    document.getElementById('vDownload').href = data.download_link;
                    result.classList.remove('hidden');
                } else {
                    alert("Error: " + (data.message || "Failed to fetch"));
                }
            } catch (e) {
                alert("Server Error. Please try again or check Vercel Logs.");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
